<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
    
    <!-- Preconnect to critical origins for faster LCP (limit to 4 most important) -->
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://b.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://c.basemaps.cartocdn.com" crossorigin />
    <link rel="preconnect" href="https://d.basemaps.cartocdn.com" crossorigin />
    
    <!-- DNS prefetch for secondary origins -->
    <link rel="dns-prefetch" href="https://nominatim.openstreetmap.org" />
    <link rel="dns-prefetch" href="https://router.project-osrm.org" />
    <link rel="dns-prefetch" href="https://cdn.gpteng.co" />
    
    <!-- Tile preloading removed — Leaflet computes tiles dynamically based on viewport,
         so a hard-coded preload was unused and triggered "preloaded but not used" warnings -->

    
    <!-- App Info -->
    <title>TripMate - Trip Cost Calculator</title>
    <meta name="description" content="Calculate trip costs with fuel, toll estimates and GPS navigation. Works offline!" />
    <meta name="author" content="TripMate" />
    
    <!-- PWA & Native App Meta Tags -->
    <meta name="theme-color" content="#0f9488" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TripMate" />
    
    <!-- Median.co / GoNative specific -->
    <meta name="gonative-fullscreen" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="HandheldFriendly" content="true" />
    
    <!-- Disable text selection for native feel -->
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- PWA Icons -->
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/pwa-512x512.png" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="TripMate - Trip Cost Calculator" />
    <meta property="og:description" content="Calculate trip costs with fuel, toll estimates and GPS navigation" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/pwa-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TripMate - Trip Cost Calculator" />
    <meta name="twitter:image" content="/pwa-512x512.png" />
    
    <!-- Native App Styles -->
    <style>
      /* Prevent zoom on input focus (mobile) */
      input, select, textarea {
        font-size: 16px !important;
      }
      
      /* Disable text selection for native feel */
      * {
        -webkit-user-select: none;
        -moz-user-select: none;
        -ms-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }
      
      /* Allow text selection only in input fields */
      input, textarea {
        -webkit-user-select: text;
        -moz-user-select: text;
        -ms-user-select: text;
        user-select: text;
      }
      
      /* Prevent pull-to-refresh on mobile */
      html, body {
        overscroll-behavior-y: contain;
        overflow: hidden;
      }
      
      #root {
        overflow: auto;
        height: 100%;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Disable tap highlight */
      * {
        -webkit-tap-highlight-color: transparent;
      }
      
      /* Hardware acceleration for smooth scrolling */
      .scrollable {
        transform: translateZ(0);
        -webkit-transform: translateZ(0);
      }
      
      /* Safe area padding for notched devices */
      .safe-area-inset {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
